<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Floating Phone Button</title>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
		/>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
				font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			}

			/* Floating Phone Button */
			.floating-btn {
				position: fixed;
				bottom: 30px;
				right: 30px;
				width: 70px;
				height: 70px;
				border-radius: 50%;
				background: linear-gradient(135deg, #15440c, #38761d);
				display: flex;
				justify-content: center;
				align-items: center;
				cursor: pointer;
				box-shadow: 0 0 15px #a4da9a, 0 0 30px #a4da9a;
				z-index: 1000;
				overflow: hidden;
				animation: pulseGlow 2s infinite;
			}

			/* Phone icon styling */
			.floating-btn i {
				color: white;
				font-size: 28px;
				z-index: 2;
				text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
			}

			/* Glowing animation */
			@keyframes pulseGlow {
				0% {
					transform: scale(1);
					box-shadow: 0 0 10px #a4da9a, 0 0 20px #a4da9a;
				}
				50% {
					transform: scale(1.05);
					box-shadow: 0 0 20px #a4da9a, 0 0 40px #a4da9a, 0 0 60px #a4da9a;
				}
				100% {
					transform: scale(1);
					box-shadow: 0 0 10px #a4da9a, 0 0 20px #a4da9a;
				}
			}

			/* Background pulse effect */
			.pulse-ring {
				position: absolute;
				width: 100%;
				height: 100%;
				border-radius: 50%;
				background: rgba(3, 107, 43, 0.3);
				animation: pulseRing 2s infinite;
				z-index: 1;
			}

			.pulse-ring:nth-child(2) {
				animation-delay: 0.5s;
			}

			.pulse-ring:nth-child(3) {
				animation-delay: 1s;
			}

			@keyframes pulseRing {
				0% {
					transform: scale(1);
					opacity: 0.7;
				}
				100% {
					transform: scale(1.8);
					opacity: 0;
				}
			}

			/* Call animation for visual feedback */
			.call-animation {
				position: absolute;
				width: 100%;
				height: 100%;
				border-radius: 50%;
				background: rgba(76, 175, 80, 0.5);
				z-index: 3;
				animation: callRing 0.5s forwards;
			}

			@keyframes callRing {
				0% {
					transform: scale(0);
					opacity: 0.7;
				}
				100% {
					transform: scale(2);
					opacity: 0;
				}
			}

			/* Call notification */
			.call-notification {
				position: fixed;
				bottom: 120px;
				right: 30px;
				background: white;
				color: #333;
				padding: 15px 25px;
				border-radius: 50px;
				box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
				font-weight: 600;
				transform: translateY(20px);
				opacity: 0;
				transition: all 0.3s ease;
				z-index: 999;
			}

			.floating-btn:hover + .call-notification {
				opacity: 1;
				transform: translateY(0);
			}

			/* Responsive design */
			@media (max-width: 768px) {
				.floating-btn {
					width: 60px;
					height: 60px;
					bottom: 20px;
					right: 20px;
				}

				.floating-btn i {
					font-size: 24px;
				}

				.call-notification {
					bottom: 100px;
					right: 20px;
					padding: 12px 20px;
					font-size: 14px;
				}
			}
		</style>
	</head>
	<body>
		<!-- Floating Button -->
		<div class="floating-btn" id="callButton">
			<div class="pulse-ring"></div>
			<div class="pulse-ring"></div>
			<div class="pulse-ring"></div>
			<i class="fas fa-phone"></i>
		</div>

		<!-- Call Notification -->
		<div class="call-notification">Click to call our support team!</div>

		<script>
			// Add click functionality to the button
			const callButton = document.getElementById('callButton');

			callButton.addEventListener('click', function () {
				// Create a visual feedback effect
				this.style.animation = 'none';
				this.style.transform = 'scale(0.9)';

				// Create call animation
				const callAnimation = document.createElement('div');
				callAnimation.classList.add('call-animation');
				this.appendChild(callAnimation);

				// Remove animation element after it completes
				setTimeout(() => {
					callAnimation.remove();
				}, 500);

				// Restore button animation after 200ms
				setTimeout(() => {
					this.style.animation = 'pulseGlow 2s infinite';
					this.style.transform = 'scale(1)';
				}, 200);

				// Show calling message
				const notification = document.querySelector('.call-notification');
				notification.textContent = 'Calling support...';
				notification.style.background = '#4CAF50';
				notification.style.color = 'white';

				// Reset after delay
				setTimeout(() => {
					notification.textContent = 'Click to call our support team!';
					notification.style.background = 'white';
					notification.style.color = '#333';
				}, 3000);

				// Initiate phone call
				window.location.href = 'tel:+17747013223';
			});
		</script>
	</body>
</html>
